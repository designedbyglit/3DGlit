<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commande confirmée – Designed by Glit</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #070707; color: #ede8e0;
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap { text-align: center; padding: 40px 24px; max-width: 520px; }
    .check {
      width: 72px; height: 72px; border: 2px solid #C8A951;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #C8A951; margin: 0 auto 28px;
    }
    .label {
      font-size: .65rem; font-weight: 600; letter-spacing: .42em;
      text-transform: uppercase; color: #C8A951; margin-bottom: 14px;
    }
    h1 { font-family: 'Rajdhani', sans-serif; font-size: 3rem; font-weight: 700; margin-bottom: 18px; }
    p { color: #8a8278; line-height: 1.8; font-size: .9rem; margin-bottom: 32px; }
    a {
      display: inline-block; background: #C8A951; color: #070707;
      font-size: .72rem; font-weight: 600; letter-spacing: .22em;
      text-transform: uppercase; padding: 14px 32px; text-decoration: none;
      transition: background .2s;
    }
    a:hover { background: #e0bc6a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="check">✓</div>
    <div class="label">Paiement confirmé</div>
    <h1>MERCI !</h1>
    <p>
      Votre paiement a bien été reçu et votre commande est enregistrée.<br>
      Vous allez recevoir un email de confirmation.<br><br>
      Votre pièce sera préparée et expédiée sous <strong style="color:#ede8e0">2 à 7 jours ouvrés</strong>.
    </p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
