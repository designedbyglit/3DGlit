<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DesignedByGlit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:black;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:26px;
font-weight:bold;
letter-spacing:2px;
}

nav a{
margin-left:30px;
text-decoration:none;
color:white;
font-size:15px;
transition:0.3s;
}

nav a:hover{
color:#ff2b2b;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(black,#111);
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
color:#aaa;
font-size:18px;
}

.hero button{
margin-top:30px;
padding:15px 40px;
border:none;
background:#ff2b2b;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
background:#ff0000;
}

/* PRODUCTS */

.products{
padding:80px 60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:50px;
}

.product{
background:#111;
border-radius:10px;
overflow:hidden;
transition:0.4s;
}

.product:hover{
transform:translateY(-10px);
}

.product img{
width:100%;
height:250px;
object-fit:cover;
}

.product-info{
padding:20px;
}

.product-info h3{
margin-bottom:10px;
}

.product-info p{
color:#aaa;
}

.product-info button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#ff2b2b;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
background:black;
color:#777;
margin-top:60px;
}

</style>

</head>

<body>

<header>

<div class="logo">
DESIGNEDBYGLIT
</div>

<nav>
<a href="#">Accueil</a>
<a href="#">Pièces</a>
<a href="#">Configurateur</a>
<a href="#">Panier</a>
</nav>

</header>

<section class="hero">

<h1>Pièces moto personnalisables</h1>

<p>Design 3D • Performance • Personnalisation</p>

<button>Voir les pièces</button>

</section>

<section class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1558981285-6f0c94958bb6">

<div class="product-info">

<h3>Cache allumage</h3>

<p>Compatible €3</p>

<button>Configurer</button>

</div>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1542367597-8849eb950fd8">

<div class="product-info">

<h3>Support radiateur</h3>

<p>Compatible AM6</p>

<button>Configurer</button>

</div>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1558980664-10ea29248c01">

<div class="product-info">

<h3>Pipe admission</h3>

<p>AM6 / €3</p>

<button>Configurer</button>

</div>

</div>

</section>

<footer>

© DesignedByGlit

</footer>

</body>

</html>
