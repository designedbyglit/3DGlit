<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3DGlit</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:28px;
background:black;
}

#viewer{
width:100%;
height:500px;
background:#222;
}

section{
padding:40px;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
border:none;
background:#ff0000;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
3DGlit
</header>

<section>

<h2>Cache allumage</h2>

<div id="viewer"></div>

<br>

<button onclick="changeColor('#ffffff')">Blanc</button>
<button onclick="changeColor('#ff0000')">Rouge</button>
<button onclick="changeColor('#0066ff')">Bleu</button>
<button onclick="changeColor('#000000')">Noir</button>

</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
document.getElementById("viewer").clientWidth/500,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(document.getElementById("viewer").clientWidth,500);

document.getElementById("viewer").appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);

camera.position.set(0,0,4);

const light = new THREE.HemisphereLight(0xffffff,0x444444,2);
scene.add(light);

let model;

const loader = new THREE.GLTFLoader();

loader.load(
"models/yes.glb",

function(gltf){

model = gltf.scene;
scene.add(model);

},

undefined,

function(error){

console.error(error);

}
);

function changeColor(color){

model.traverse(function(child){

if(child.isMesh){

child.material.color.set(color);

}

});

}

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
