<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DesignedByGlit</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:black;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
}

nav a{
margin-left:30px;
text-decoration:none;
color:white;
font-size:16px;
}

nav a:hover{
color:red;
}

/* HERO */

.hero{
height:500px;
background:linear-gradient(black, #111);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

.hero button{
margin-top:20px;
padding:15px 30px;
border:none;
background:red;
color:white;
font-size:16px;
cursor:pointer;
}

/* PRODUCTS */

.products{
padding:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.product{
background:#111;
padding:20px;
text-align:center;
border-radius:10px;
transition:0.3s;
}

.product:hover{
transform:translateY(-10px);
}

.product img{
width:100%;
}

.product h3{
margin:10px 0;
}

.product button{
padding:10px 20px;
border:none;
background:red;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
background:black;
padding:40px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<header>

<div class="logo">
DesignedByGlit
</div>

<nav>
<a href="#">Accueil</a>
<a href="#">Pièces</a>
<a href="#">Configurateur</a>
<a href="#">Panier</a>
</nav>

</header>

<section class="hero">

<h1>Pièces Moto 3D</h1>

<p>Personnalise tes pièces directement en ligne</p>

<button>Configurer</button>

</section>

<section class="products">

<div class="product">

<img src="https://via.placeholder.com/400">

<h3>Cache allumage</h3>

<p>€3</p>

<button>Configurer</button>

</div>

<div class="product">

<img src="https://via.placeholder.com/400">

<h3>Support radiateur</h3>

<p>AM6</p>

<button>Configurer</button>

</div>

<div class="product">

<img src="https://via.placeholder.com/400">

<h3>Pipe admission</h3>

<p>AM6</p>

<button>Configurer</button>

</div>

</section>

<footer>

© DesignedByGlit

</footer>

</body>

</html>
