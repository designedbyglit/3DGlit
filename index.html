<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GLIT</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

.menu a{
margin-left:30px;
text-decoration:none;
color:white;
font-size:14px;
}

/* HERO */

.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
opacity:0.7;
}

.hero button{
margin-top:20px;
padding:12px 30px;
border:none;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

/* PRODUITS */

.products{
padding:80px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.product{
background:#111;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
display:block;
}

.product-info{
padding:20px;
}

.product-info h3{
margin:0;
}

.product-info p{
opacity:0.6;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
opacity:0.5;
}

</style>
</head>

<body>

<nav>

<div class="logo">
GLIT
</div>

<div class="menu">
<a href="#">Accueil</a>
<a href="#">Produits</a>
<a href="#">Configurateur</a>
<a href="#">Contact</a>
</div>

</nav>

<section class="hero">

<h1>PIÈCES 3D PERFORMANCE</h1>

<p>Designées par GLIT</p>

<button>VOIR LES PRODUITS</button>

</section>

<section class="products">

<div class="product">

<img src="images/produit1.jpg">

<div class="product-info">

<h3>Cache allumage</h3>

<p>€39</p>

</div>

</div>

<div class="product">

<img src="images/produit2.jpg">

<div class="product-info">

<h3>Cache moteur</h3>

<p>€45</p>

</div>

</div>

<div class="product">

<img src="images/produit3.jpg">

<div class="product-info">

<h3>Protection carter</h3>

<p>€29</p>

</div>

</div>

</section>

<footer>

GLIT © 2026

</footer>

</body>
</html>
