<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DesignedByGlit</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:black;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu a{
margin-left:25px;
text-decoration:none;
color:white;
}

/* HERO */

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:50px;
}

/* PRODUITS */

.products{
padding:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.product{
background:#111;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
}

.product-info{
padding:20px;
}

.product-info h3{
margin:0;
}

.product-info p{
opacity:0.7;
}

/* BOUTON */

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:white;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
opacity:0.5;
}

</style>
</head>

<body>

<nav>

<div class="logo">
DESIGNEDBYGLIT
</div>

<div class="menu">
<a href="#">Accueil</a>
<a href="#">Produits</a>
<a href="#">Configurateur</a>
<a href="#">Panier</a>
</div>

</nav>

<section class="hero">

<h1>Pièces moto personnalisées</h1>

</section>

<section class="products">

<!-- PRODUIT 1 -->
<div class="product">
<img src="images/cache-allumage.jpg">
<div class="product-info">
<h3>Cache allumage</h3>
<p>€39</p>
<button>Voir</button>
</div>
</div>

<!-- PRODUIT 2 -->
<div class="product">
<img src="images/cache-embrayage.jpg">
<div class="product-info">
<h3>Cache embrayage</h3>
<p>€39</p>
<button>Voir</button>
</div>
</div>

<!-- PRODUIT 3 -->
<div class="product">
<img src="images/support-radiateur.jpg">
<div class="product-info">
<h3>Support radiateur</h3>
<p>€29</p>
<button>Voir</button>
</div>
</div>

<!-- PRODUIT 4 -->
<div class="product">
<img src="images/pipe-admission.jpg">
<div class="product-info">
<h3>Pipe admission</h3>
<p>€32</p>
<button>Voir</button>
</div>
</div>

</section>

<footer>

© DesignedByGlit

</footer>

</body>
</html>
